ai_usage_summary: |
  Used Gemini (Antigravity IDE) for code structure discussion and review.
  All feature engineering decisions, weighting logic, and honeypot detection
  were grounded in careful analysis of the candidate data and JD. No candidate
  data was passed to any hosted LLM during or after preprocessing.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Feature-based ranker with 29 hand-crafted signals extracted from the
  candidate schema. Scoring combines: (1) a weighted skill-overlap score
  matching against 35 JD-specific keywords with proficiency x duration
  weighting; (2) title/career trajectory features detecting ML/search/
  retrieval experience; (3) a Gaussian experience score centred at 7 years;
  (4) company-type signals (product vs consulting); (5) education tier;
  (6) location bonus for Pune/Noida. A multiplicative behavioral modifier
  (0.40x–1.50x) derived from 7 engagement signals weights in recency,
  recruiter response rate, and platform activity. Four independent honeypot
  detectors (calendar duration mismatch, expert-with-zero-duration, high
  endorsement rates, pre-founding-year employment) assign floor scores to
  impossible profiles. All scoring is fully vectorised with NumPy; ranking
  100K candidates takes < 5 seconds on CPU.

